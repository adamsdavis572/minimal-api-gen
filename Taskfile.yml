# https://taskfile.dev

version: '3'

vars:
  GENERATOR_DIR: ./generator
  TEST_OUTPUT_DIR: ./test-output
  PETSTORE_SPEC: ./petstore-tests/petstore.yaml
  TEST_PROJECT: "./petstore-tests/PetstoreApi.Tests/PetstoreApi.Tests.csproj"
  ALT_SPEC: ./alt-oas-gen/spec/alt-api.yaml
  ALT_OUTPUT_DIR: ./alt-oas-gen/output
  ALT_PACKAGE: AlternativeApi

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list
    silent: true

  # ==============================================================================
  # GENERATOR - Build Custom OpenAPI Generator
  # ==============================================================================

  generator:build-test:
    desc: Build the custom OpenAPI generator JAR and runs unit tests
    cmds:
      - task: generator:build
      - task: test:generator

  generator:build:
    desc: Build the custom OpenAPI generator JAR
    sources:
      - generator/src/main/java/**/*.java
      - generator/src/main/resources/**/*
      - generator/pom.xml
    generates:
      - generator/target/aspnet-minimalapi-openapi-generator.jar
    cmds:
      - echo "Building custom OpenAPI generator..."
      - |
        cd generator
        mvn clean package -q
      - echo "✓ Generator built successfully"

  generator:download-cli:
    desc: Downloads main generator CLI from Maven
    vars:
      CLI_URL: https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/7.17.0/openapi-generator-cli-7.17.0.jar
    cmds:
      - echo "Downloading OpenAPI Generator CLI..."
      - wget {{.CLI_URL}} -O {{.GENERATOR_DIR}}/openapi-generator-cli.jar
      - echo "✓ Generator CLI downloaded successfully"
    status:
      - test -f "{{.GENERATOR_DIR}}/openapi-generator-cli.jar"

  # ==============================================================================
  # CODEGEN - Generate API Code from OpenAPI Spec
  # ==============================================================================

  gen:petstore:
    desc: Generate server code from OpenAPI spec (with MediatR and optional properties)
    deps:
      - generator:build
      - generator:download-cli
    vars:
      GENERATOR_JAR: "{{.GENERATOR_DIR}}/target/aspnet-minimalapi-openapi-generator.jar"
      CLI_JAR: "{{.GENERATOR_DIR}}/openapi-generator-cli.jar"
      ADDITIONAL_PROPS: '{{.ADDITIONAL_PROPS | default "packageName=PetstoreApi,useMediatr=true,useValidators=true,useProblemDetails=true,useNugetPackaging=true"}}'
    cmds:
      - echo "Deleting old generated code..."
      - rm -rf {{.TEST_OUTPUT_DIR}}
      - echo "Generating server code with properties {{.ADDITIONAL_PROPS}}..."
      - |
        java -cp "{{.GENERATOR_JAR}}:{{.CLI_JAR}}" \
          org.openapitools.codegen.OpenAPIGenerator generate \
          -g aspnetcore-minimalapi \
          -i {{.PETSTORE_SPEC}} \
          -o {{.TEST_OUTPUT_DIR}} \
          --additional-properties {{.ADDITIONAL_PROPS}}
      - echo "✓ Server code generated"

  gen:copy-test-stubs:
    desc: Copy test handlers and test project over generated stubs
    vars:
      TEST_HANDLERS_DIR: ./petstore-tests/TestHandlers
      TEST_AUTH_DIR: ./petstore-tests/Auth
      TEST_CONFIGURATORS_DIR: ./petstore-tests/Configurators
      TEST_PROJECT_DIR: ./petstore-tests/PetstoreApi.Tests
      OUTPUT_HANDLERS_DIR: "{{.TEST_OUTPUT_DIR}}/src/PetstoreApi/Handlers"
      OUTPUT_SERVICES_DIR: "{{.TEST_OUTPUT_DIR}}/src/PetstoreApi/Services"
      OUTPUT_FILTERS_DIR: "{{.TEST_OUTPUT_DIR}}/src/PetstoreApi/Filters"
      OUTPUT_CONFIGURATORS_DIR: "{{.TEST_OUTPUT_DIR}}/src/PetstoreApi/Configurators"
      OUTPUT_EXTENSIONS_DIR: "{{.TEST_OUTPUT_DIR}}/src/PetstoreApi/Extensions"
      TEST_EXTENSIONS_DIR: ./petstore-tests/PetstoreApi/Extensions
    cmds:
      - echo "Copying test project..."
      - mkdir -p {{.TEST_OUTPUT_DIR}}/tests
      - cp -r {{.TEST_PROJECT_DIR}} {{.TEST_OUTPUT_DIR}}/tests/
      - echo "✓ Test project copied"
      - |
        if [ -d "{{.TEST_OUTPUT_DIR}}/src/PetstoreApi.Contracts" ]; then
          echo "Detected NuGet packaging mode - adding project references..."
          cd {{.TEST_OUTPUT_DIR}}/tests/PetstoreApi.Tests
          dotnet add reference ../../src/PetstoreApi.Contracts/PetstoreApi.Contracts.csproj
          dotnet add reference ../../src/PetstoreApi/PetstoreApi.csproj
          echo "✓ Added Contracts and Implementation project references"
        fi
      - echo "Copying test handler implementations..."
      - mkdir -p {{.OUTPUT_HANDLERS_DIR}}
      - mkdir -p {{.OUTPUT_SERVICES_DIR}}
      - cp {{.TEST_HANDLERS_DIR}}/GetPetByIdQueryHandler.Impl.cs {{.OUTPUT_HANDLERS_DIR}}/
      - cp {{.TEST_HANDLERS_DIR}}/AddPetCommandHandler.Impl.cs {{.OUTPUT_HANDLERS_DIR}}/
      - cp {{.TEST_HANDLERS_DIR}}/UpdatePetCommandHandler.Impl.cs {{.OUTPUT_HANDLERS_DIR}}/
      - cp {{.TEST_HANDLERS_DIR}}/DeletePetCommandHandler.Impl.cs {{.OUTPUT_HANDLERS_DIR}}/
      - cp {{.TEST_HANDLERS_DIR}}/FindPetsByStatusQueryHandler.Impl.cs {{.OUTPUT_HANDLERS_DIR}}/
      - cp {{.TEST_HANDLERS_DIR}}/FindPetsByTagsQueryHandler.Impl.cs {{.OUTPUT_HANDLERS_DIR}}/
      - cp {{.TEST_HANDLERS_DIR}}/DeleteOrderCommandHandler.Impl.cs {{.OUTPUT_HANDLERS_DIR}}/
      - cp {{.TEST_HANDLERS_DIR}}/DeleteUserCommandHandler.Impl.cs {{.OUTPUT_HANDLERS_DIR}}/
      - cp {{.TEST_HANDLERS_DIR}}/FakeNullableExampleTestQueryHandler.Impl.cs {{.OUTPUT_HANDLERS_DIR}}/
      - cp {{.TEST_HANDLERS_DIR}}/GetInventoryQueryHandler.Impl.cs {{.OUTPUT_HANDLERS_DIR}}/
      - cp {{.TEST_HANDLERS_DIR}}/GetOrderByIdQueryHandler.Impl.cs {{.OUTPUT_HANDLERS_DIR}}/
      - cp {{.TEST_HANDLERS_DIR}}/GetUserByNameQueryHandler.Impl.cs {{.OUTPUT_HANDLERS_DIR}}/
      - cp {{.TEST_HANDLERS_DIR}}/LoginUserQueryHandler.Impl.cs {{.OUTPUT_HANDLERS_DIR}}/
      - cp {{.TEST_HANDLERS_DIR}}/PlaceOrderCommandHandler.Impl.cs {{.OUTPUT_HANDLERS_DIR}}/
      - cp {{.TEST_HANDLERS_DIR}}/UploadFileCommandHandler.Impl.cs {{.OUTPUT_HANDLERS_DIR}}/
      - cp {{.TEST_HANDLERS_DIR}}/InMemoryPetStore.cs {{.OUTPUT_SERVICES_DIR}}/
      - echo "✓ Test handlers copied successfully"
      - echo "Copying PermissionEndpointFilter..."
      - mkdir -p {{.OUTPUT_FILTERS_DIR}}
      - cp {{.TEST_AUTH_DIR}}/PermissionEndpointFilter.cs {{.OUTPUT_FILTERS_DIR}}/
      - echo "✓ PermissionEndpointFilter copied successfully"
      - echo "Copying configurators..."
      - mkdir -p {{.OUTPUT_CONFIGURATORS_DIR}}
      - cp {{.TEST_CONFIGURATORS_DIR}}/ApplicationServiceConfigurator.cs {{.OUTPUT_CONFIGURATORS_DIR}}/
      - echo "✓ Configurators copied successfully"
      - echo "Copying extensions..."
      - mkdir -p {{.OUTPUT_EXTENSIONS_DIR}}
      - cp {{.TEST_EXTENSIONS_DIR}}/ServiceCollectionExtensions.cs {{.OUTPUT_EXTENSIONS_DIR}}/
      - echo "✓ Extensions copied successfully"

  gen:copy-test-stubs-with-auth:
    desc: Copy test stubs WITH JWT auth (SecurityConfigurator + JwtBearer NuGet package)
    vars:
      TEST_CONFIGURATORS_DIR: ./petstore-tests/Configurators
      OUTPUT_CONFIGURATORS_DIR: "{{.TEST_OUTPUT_DIR}}/src/PetstoreApi/Configurators"
      IMPL_PROJECT: "{{.TEST_OUTPUT_DIR}}/src/PetstoreApi/PetstoreApi.csproj"
    deps:
      - gen:copy-test-stubs
    cmds:
      - echo "Copying SecurityConfigurator..."
      - mkdir -p {{.OUTPUT_CONFIGURATORS_DIR}}
      - cp {{.TEST_CONFIGURATORS_DIR}}/SecurityConfigurator.cs {{.OUTPUT_CONFIGURATORS_DIR}}/
      - echo "✓ SecurityConfigurator copied"
      - echo "Adding JwtBearer NuGet package to implementation project..."
      - dotnet add {{.IMPL_PROJECT}} package Microsoft.AspNetCore.Authentication.JwtBearer --version 8.0.0
      - echo "✓ JwtBearer package added"

  # ==============================================================================
  # BUILD - Compile Generated Code
  # ==============================================================================

  build:all:
    desc: Build entire solution (both projects when NuGet packaging enabled)
    cmds:
      - echo "Building entire solution..."
      - dotnet build {{.TEST_OUTPUT_DIR}}/ --verbosity minimal
      - echo "✓ Solution built successfully"
    preconditions:
      - test -f {{.TEST_OUTPUT_DIR}}/PetstoreApi.sln

  build:contracts-nuget:
    desc: Build the Contracts project only (for NuGet packaging workflow)
    cmds:
      - echo "Building Contracts project..."
      - dotnet build {{.TEST_OUTPUT_DIR}}/src/PetstoreApi.Contracts/ --verbosity minimal
      - echo "✓ Contracts built successfully"
    preconditions:
      - test -f {{.TEST_OUTPUT_DIR}}/src/PetstoreApi.Contracts/PetstoreApi.Contracts.csproj

  build:impl-nuget:
    desc: Build Implementation project that uses Contracts via NuGet package reference
    deps:
      - build:contracts-nuget
    cmds:
      - echo "Building Implementation project (using NuGet contracts)..."
      - dotnet build {{.TEST_OUTPUT_DIR}}/src/PetstoreApi/ --verbosity minimal
      - echo "✓ Implementation built successfully (with NuGet contracts)"
    preconditions:
      - test -f {{.TEST_OUTPUT_DIR}}/src/PetstoreApi/PetstoreApi.csproj

  # ==============================================================================
  # TEST - Unit & Integration Testing
  # ==============================================================================

  test:generator:
    desc: Run generator unit tests (validates mustache templates directly - no code generation required)
    cmds:
    

      - |
        if ls generator-tests/*.csproj 1> /dev/null 2>&1; then
          echo "Running generator unit tests (template validation)..."
          dotnet test generator-tests/ --verbosity normal
        else
          echo "⚠️  Generator tests not yet implemented"
          echo "   Directory: generator-tests/ exists but no .csproj found"
          echo "   To set up: cd generator-tests && dotnet new xunit --name GeneratorTests"
        fi

  test:petstore-unit:
    desc: Run xUnit tests for generated petstore API (assumes code already generated)
    deps:
      - gen:copy-test-stubs
    cmds:
      - echo "Running petstore unit tests..."
      - dotnet test {{.TEST_OUTPUT_DIR}}/tests/PetstoreApi.Tests/PetstoreApi.Tests.csproj --verbosity normal

  test:petstore-integration:
    desc: Full petstore API lifecycle test (start → wait → Bruno tests → stop)
    vars:
      SUITE: '{{.SUITE | default ""}}'
    deps:
      - gen:copy-test-stubs
    cmds:
      - task: api:start
      - defer: { task: api:stop }
      - task: api:wait
      - task: bruno:run{{if .SUITE}}-{{.SUITE}}{{end}}

  test:petstore-integration-single:
    desc: Run specific petstore Bruno test(s) with full lifecycle (usage - task test:petstore-integration-single TEST='pet/add-pet.bru')
    vars:
      TEST: '{{.TEST | default "pet/Add a new pet to the store.bru"}}'
    deps:
      - gen:copy-test-stubs
    cmds:
      - task: api:start
      - defer: { task: api:stop }
      - task: api:wait
      - task: bruno:run-single
        vars: {TEST: '{{.TEST}}'}

  # ==============================================================================
  # Regression Tests - Full tests including generation with different options
  # ==============================================================================



  regress:full-petstore-validators-problemdetails:
    desc: "Full petstore regression (generate + test) with useNugetPackaging disabled"
    cmds:
      - task: clean:generated
      - task: gen:petstore 
        vars: {ADDITIONAL_PROPS: "packageName=PetstoreApi,useMediatr=true,useValidators=true,useProblemDetails=true,useNugetPackaging=false"}
      - task: test:petstore-unit
      - task: test:petstore-integration
        vars: {SUITE: "all-suites"}

  regress:full-petstore-validators-problemdetails-nuget:
    desc: "Full petstore regression (build + generate + test)"
    cmds:
      - task: clean:generated
      - task: gen:petstore 
        vars: {ADDITIONAL_PROPS: "packageName=PetstoreApi,useMediatr=true,useValidators=true,useProblemDetails=true,useNugetPackaging=true"}
      - task: test:petstore-unit
      - task: test:petstore-integration
        vars: {SUITE: "all-suites"}

  regress:full-petstore-validators-problemdetails-nuget-auth:
    desc: "Full petstore regression with JWT auth enabled (NuGet packaging)"
    cmds:
      - task: clean:generated
      - task: gen:petstore 
        vars: {ADDITIONAL_PROPS: "packageName=PetstoreApi,useMediatr=true,useValidators=true,useProblemDetails=true,useNugetPackaging=true"}
      - task: gen:copy-test-stubs-with-auth
      - task: test:petstore-unit
      - task: test:petstore-integration
        vars: {SUITE: "all-suites-with-auth"}
 

 

  # ==============================================================================
  # API - Manage Test API Server
  # ==============================================================================

  api:run:
    desc: Launch the generated Petstore API server (foreground)
    vars:
      API_PROJECT: "{{.TEST_OUTPUT_DIR}}/src/PetstoreApi/PetstoreApi.csproj"
    deps:
      - gen:copy-test-stubs
    cmds:
      - echo "Starting Petstore API server..."
      - dotnet run --project {{.API_PROJECT}}

  api:start:
    desc: Start the .NET API in background and save PID
    deps:
      - gen:copy-test-stubs
    dir: "{{.TEST_OUTPUT_DIR}}/src/PetstoreApi"
    cmds:
      - bash -c 'nohup dotnet run > /dev/null 2>&1 & echo $! > ../.server.pid'
      - echo "API starting with PID $(cat ../.server.pid)..."

  api:wait:
    desc: Wait until the API is healthy
    cmds:
      - echo "Waiting for API to be healthy..."
      - |
        until curl --output /dev/null --silent --head --fail -X GET http://localhost:5198/health; do
          printf '.'
          sleep 1
        done
      - echo "\nAPI is up!"

  api:stop:
    desc: Stop the background API using saved PID
    dir: "{{.TEST_OUTPUT_DIR}}/src/PetstoreApi"
    cmds:
      - |
        if [ -f ../.server.pid ]; then
          PID=$(cat ../.server.pid)
          echo "Stopping API (PID $PID)..."
          bash -c "kill $PID" || true
          rm ../.server.pid
        else
          echo "No PID file found. Kill any process on port 5198 as fallback..."
          lsof -ti:5198 | xargs kill -9 || true
        fi

  # ==============================================================================
  # BRUNO - API Test Suites
  # ==============================================================================

  bruno:run:
    desc: Run all Bruno API tests
    dir: ./bruno/OpenAPI_Petstore
    cmds:
      - echo "Running Bruno tests..."
      - bru run --env local

  bruno:run-main-suite:
    desc: Run main pet test suite (6 tests - CRUD operations)
    dir: ./bruno/OpenAPI_Petstore
    cmds:
      - bru run pet/main-pet-test-suite --env local

  bruno:run-validation-suite:
    desc: Run validation test suite (13 tests - FluentValidation)
    dir: ./bruno/OpenAPI_Petstore
    cmds:
      - bru run pet/validation-pet-test-suite --env local

  bruno:run-auth-suite:
    desc: Run authorization test suite (4 tests - Feature 009)
    dir: ./bruno/OpenAPI_Petstore
    cmds:
      - bru run auth-suite --env local

  bruno:run-all-suites:
    desc: Run both main + validation suites (19 tests total)
    cmds:
      - task: bruno:run-main-suite
      - task: bruno:run-validation-suite

  bruno:run-all-suites-with-auth:
    desc: Run main + validation + auth suites (23 tests total)
    cmds:
      - task: bruno:run-main-suite
      - task: bruno:run-validation-suite
      - task: bruno:run-auth-suite

  bruno:run-single:
    desc: Run one or more Bruno test files
    vars:
      BRUNO_DIR: ./bruno/OpenAPI_Petstore
      TEST: '{{.TEST | default "pet/Add a new pet to the store.bru"}}'
    dir: '{{.BRUNO_DIR}}'
    cmds:
      - echo "Running Bruno test(s) - {{.TEST}}"
      - bru run --env local {{.TEST}}

  bruno:debug-single:
    desc: Run a single Bruno test and output full request/response context to JSON for debugging
    vars:
      BRUNO_DIR: ./bruno/OpenAPI_Petstore
      TEST: '{{.TEST}}'
      REPORT_FILE: ../../test-output/bruno-debug.json
    dir: '{{.BRUNO_DIR}}'
    cmds:
      - echo "Running Bruno debug on - {{.TEST}}"
      - bru run --env local {{.TEST}} --reporter-json {{.REPORT_FILE}}

  # ==============================================================================
  # DOCKER - Container Management
  # ==============================================================================

  docker:build:
    desc: Build Docker image with custom OpenAPI generator
    vars:
      IMAGE_NAME: adamsdavis/minimal-api-generator
      IMAGE_TAG: latest
      OPENAPI_GENERATOR_VERSION: 7.10.0
    deps:
      - generator:build
    cmds:
      - echo "Building Docker image..."
      - |
        podman build \
          --build-arg ARG_OPENAPI_GENERATOR_VERSION={{.OPENAPI_GENERATOR_VERSION}} \
          -t {{.IMAGE_NAME}}:{{.IMAGE_TAG}} \
          -f docker/Dockerfile \
          .
      - echo "✓ Docker image built - {{.IMAGE_NAME}}:{{.IMAGE_TAG}}"

  docker:push:
    desc: Push Docker image to registry
    vars:
      IMAGE_NAME: adamsdavis/minimal-api-generator
      IMAGE_TAG: latest
    cmds:
      - echo "Pushing Docker image to registry..."
      - podman push {{.IMAGE_NAME}}:{{.IMAGE_TAG}}
      - echo "✓ Image pushed - {{.IMAGE_NAME}}:{{.IMAGE_TAG}}"

  docker:test:
    desc: Test Docker image by generating code
    vars:
      IMAGE_NAME: adamsdavis/minimal-api-generator
      IMAGE_TAG: latest
      DOCKER_TEST_OUTPUT: ./docker-test-output
    cmds:
      - echo "Testing Docker image..."
      - rm -rf {{.DOCKER_TEST_OUTPUT}}
      - mkdir -p {{.DOCKER_TEST_OUTPUT}}
      - |
        docker run --rm \
          -v $(pwd):/workspace \
          {{.IMAGE_NAME}}:{{.IMAGE_TAG}} \
          generate \
          -g aspnetcore-minimalapi \
          -i /workspace/petstore-tests/petstore.yaml \
          -o /workspace/{{.DOCKER_TEST_OUTPUT}} \
          --additional-properties packageName=PetstoreApi,useMediatr=true
      - echo "✓ Docker test complete. Output in {{.DOCKER_TEST_OUTPUT}}"
      - test -f {{.DOCKER_TEST_OUTPUT}}/src/PetstoreApi/Program.cs || (echo "❌ Program.cs NOT found" && exit 1)
      - test -f {{.DOCKER_TEST_OUTPUT}}/src/PetstoreApi/Commands/AddPetCommand.cs || (echo "❌ MediatR Commands NOT found" && exit 1)
      - echo "✅ All validation checks passed"

  # ==============================================================================
  # ALT-OAS-GEN - Alternative OAS generation workspace
  # ==============================================================================

  alt:gen:
    desc: Generate server code from the alternative OAS spec (alt-oas-gen/spec/alt-api.yaml)
    deps:
      - generator:build
      - generator:download-cli
    vars:
      GENERATOR_JAR: "{{.GENERATOR_DIR}}/target/aspnet-minimalapi-openapi-generator.jar"
      CLI_JAR: "{{.GENERATOR_DIR}}/openapi-generator-cli.jar"
      ADDITIONAL_PROPS: '{{.ADDITIONAL_PROPS | default "packageName=AlternativeApi,useMediatr=true,useValidators=true,useProblemDetails=true,useNugetPackaging=false"}}'
    cmds:
      - echo "Deleting old alt-oas-gen output..."
      - rm -rf {{.ALT_OUTPUT_DIR}}
      - echo "Generating AlternativeApi with properties {{.ADDITIONAL_PROPS}}..."
      - |
        java -cp "{{.GENERATOR_JAR}}:{{.CLI_JAR}}" \
          org.openapitools.codegen.OpenAPIGenerator generate \
          -g aspnetcore-minimalapi \
          -i {{.ALT_SPEC}} \
          -o {{.ALT_OUTPUT_DIR}} \
          --additional-properties {{.ADDITIONAL_PROPS}}
      - echo "✓ AlternativeApi generated in {{.ALT_OUTPUT_DIR}}"

  alt:copy-impl:
    desc: Copy handler impls and services from alt-oas-gen/impl/ into the generated output dir
    vars:
      IMPL_DIR: ./alt-oas-gen/impl
      OUT_API_DIR: "{{.ALT_OUTPUT_DIR}}/src/AlternativeApi"
    cmds:
      - echo "Copying impl services..."
      - mkdir -p {{.OUT_API_DIR}}/Services
      - cp {{.IMPL_DIR}}/Services/*.cs {{.OUT_API_DIR}}/Services/
      - echo "Copying impl handlers..."
      - mkdir -p {{.OUT_API_DIR}}/Handlers
      - cp {{.IMPL_DIR}}/Handlers/*.cs {{.OUT_API_DIR}}/Handlers/
      - echo "Copying impl extensions..."
      - cp {{.IMPL_DIR}}/Extensions/ServiceCollectionExtensions.cs {{.OUT_API_DIR}}/Extensions/
      - echo "Copying impl configurators..."
      - mkdir -p {{.OUT_API_DIR}}/Configurators
      - cp {{.IMPL_DIR}}/Configurators/ApplicationServiceConfigurator.cs {{.OUT_API_DIR}}/Configurators/
      - echo "✓ Impl files copied"
    preconditions:
      - sh: test -f {{.ALT_OUTPUT_DIR}}/AlternativeApi.sln
        msg: "output not found - run 'task alt:gen' first"

  alt:build:
    desc: Build the generated AlternativeApi solution (copies impl files first)
    deps:
      - alt:copy-impl
    cmds:
      - echo "Building AlternativeApi solution..."
      - dotnet build {{.ALT_OUTPUT_DIR}}/ --verbosity minimal
      - echo "✓ AlternativeApi solution built"
    preconditions:
      - sh: test -f {{.ALT_OUTPUT_DIR}}/AlternativeApi.sln
        msg: "AlternativeApi.sln not found - run 'task alt:gen' first"

  alt:run:
    desc: Launch the generated AlternativeApi server (foreground)
    vars:
      ALT_API_PROJECT: "{{.ALT_OUTPUT_DIR}}/src/AlternativeApi/AlternativeApi.csproj"
    cmds:
      - echo "Starting AlternativeApi server..."
      - dotnet run --project {{.ALT_API_PROJECT}}
    preconditions:
      - sh: test -f {{.ALT_OUTPUT_DIR}}/src/AlternativeApi/AlternativeApi.csproj
        msg: "AlternativeApi.csproj not found - run 'task alt:gen' first"

  alt:clean:
    desc: Delete generated AlternativeApi output (keeps spec and generator artifacts)
    cmds:
      - echo "Cleaning alt-oas-gen output..."
      - rm -rf {{.ALT_OUTPUT_DIR}}
      - echo "✓ alt-oas-gen output cleaned"

  # ==============================================================================
  # CLEAN - Cleanup Tasks
  # ==============================================================================

  clean:generated:
    desc: Clean only generated Minimal API code (keeps generator artifacts)
    cmds:
      - echo "Cleaning generated Minimal API code..."
      - rm -rf {{.TEST_OUTPUT_DIR}}
      - echo "✓ Generated API code cleaned"

  clean:all:
    desc: Clean all generated code and build artifacts
    cmds:
      - echo "Cleaning all generated code..."
      - rm -rf {{.TEST_OUTPUT_DIR}}
      - echo "Cleaning generator build artifacts..."
      - |
        cd generator
        mvn clean
      - echo "✓ Cleaned"



